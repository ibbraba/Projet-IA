services:
  
  # nginx:
  # 	build: ./nginx
  # 	ports:
  # 		- "${NGINX_PORT:-80}:80"
  # 	depends_on:
  # 		- frontend
  # 		- backend
  # 	networks:
  # 		- app

  frontend:
    build: ./frontend
    container_name: frontend
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - app

  backend:
    build: ./backend
    containern_name: backend
    env_file:
      - ./backend/.env.example
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/models_cache:/app/models_cache
    networks:
      - app

  postgres:
    image: postgres:latest
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-cvuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-cvpass}
      - POSTGRES_DB=${POSTGRES_DB:-cvdb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - app

volumes:
  postgres_data:

networks:
  app:
